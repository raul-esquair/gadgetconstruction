name: Weekly blog publish

# Triggers a Netlify rebuild once a week so pre-written blog posts whose
# `date` field has now passed become visible on the site.
#
# The posts themselves are filtered at build time by `getPublishedPosts()`
# in `lib/blog-data.ts` — this workflow just causes a rebuild to happen.

on:
  schedule:
    # Every Monday at 14:00 UTC.
    # That is 7am PDT (summer) or 6am PST (winter) — early morning Pacific,
    # so posts are live before visitors start browsing Monday morning.
    - cron: '0 14 * * 1'
  # Allow manual trigger from the GitHub Actions UI for testing or ad-hoc publishes.
  workflow_dispatch:

jobs:
  trigger-netlify-rebuild:
    name: Trigger Netlify rebuild
    runs-on: ubuntu-latest
    steps:
      - name: POST to Netlify build hook
        env:
          HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::NETLIFY_BUILD_HOOK_URL secret is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Triggering Netlify rebuild..."
          curl --fail --show-error -X POST -d '{}' "$HOOK_URL"
          echo ""
          echo "Rebuild triggered. Monitor progress in the Netlify dashboard."
