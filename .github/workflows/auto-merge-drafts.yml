name: Auto-merge open blog drafts

# Safety net for the weekly blog pipeline. If the reviewer doesn't
# manually merge an open drafts/* PR by Sunday night, this workflow
# squash-merges it so the post is on main and publishes Monday morning.
#
# Contract:
#   - Leave PR open → implicit approval → auto-merges Sunday night
#   - Close PR      → explicit rejection → nothing publishes, brief stays queued on main
#   - Edit PR       → still auto-merges (edits are captured in the branch)
#
# Timing:
#   Sunday 23:00 PT (~Monday 06:00-07:00 UTC)  ← this workflow
#   Monday  07:00 PT (~Monday 14:00-15:00 UTC) ← weekly-publish.yml rebuild
#
# The ~7-hour gap ensures merge commits land on main before the publish rebuild.

on:
  schedule:
    # Monday 07:00 UTC = Sunday 23:00 PST / Monday 00:00 PDT
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  auto-merge:
    name: Squash-merge pending draft PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Find and merge open draft PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List all open PRs whose head branch starts with drafts/
          prs=$(gh pr list \
            --repo raul-esquair/gadgetconstruction \
            --state open \
            --base main \
            --json number,headRefName,title \
            --jq '.[] | select(.headRefName | startswith("drafts/")) | .number')

          if [ -z "$prs" ]; then
            echo "No open draft PRs. Nothing to auto-merge."
            exit 0
          fi

          for pr in $prs; do
            echo "──────────────────────────────────────────"
            echo "PR #$pr — checking CI status"
            echo "──────────────────────────────────────────"

            if ! gh pr checks "$pr" --repo raul-esquair/gadgetconstruction; then
              echo "::warning::CI checks failed or still pending for PR #$pr — skipping auto-merge"
              gh pr comment "$pr" --repo raul-esquair/gadgetconstruction --body "🚫 **Auto-merge skipped — CI failing or pending**

              CI checks haven't passed on this draft PR. The post will NOT publish Monday until the build is fixed and the PR is merged manually.

              Common causes: TypeScript errors in the inserted blog post, malformed markdown that breaks the template literal in lib/blog-data.ts, or a transient CI hiccup. Re-run the failed workflow, or close this PR to push the brief back to next week's slot."
              continue
            fi

            echo "CI passed. Auto-merging PR #$pr"
            gh pr comment "$pr" --repo raul-esquair/gadgetconstruction --body "⏰ **Auto-merged**

            This PR was still open at the Sunday 11pm PT deadline, so it's being auto-merged per the default-approve pipeline policy. The post will publish on its scheduled date when the weekly rebuild fires Monday morning.

            If this was a mistake:
            - Revert the merge on \`main\` (within a few hours, before the Monday rebuild triggers)
            - Or edit the post directly on \`main\` — it stays hidden until its scheduled date anyway"

            gh pr merge "$pr" --repo raul-esquair/gadgetconstruction --squash --delete-branch --admin
          done

          echo ""
          echo "Auto-merge pass complete."
