name: Merge proposed briefs into queue

# When a proposals/content-batch-* PR is merged to main, this workflow
# automatically migrates briefs from content/proposed-briefs.json into
# content/post-queue.json with status set to "queued", then clears the
# proposal file. The briefs are now picked up by the Friday automation.

on:
  push:
    branches: [main]
    paths:
      - "content/proposed-briefs.json"

jobs:
  migrate:
    name: Migrate proposed briefs into queue
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for proposed briefs
        id: check
        run: |
          if [ ! -s content/proposed-briefs.json ]; then
            echo "content/proposed-briefs.json doesn't exist or is empty — nothing to migrate."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Must be a non-empty JSON array
          count=$(jq 'length' content/proposed-briefs.json 2>/dev/null || echo "0")
          if [ "$count" = "0" ]; then
            echo "proposed-briefs.json contains empty array — nothing to migrate."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Found $count proposed brief(s) to migrate."
          fi

      - name: Migrate briefs
        if: steps.check.outputs.skip != 'true'
        run: |
          # Merge proposed briefs into the queue, flipping status "proposed" → "queued"
          jq --slurpfile proposed content/proposed-briefs.json \
            '. + ($proposed[0] | map(. + { status: "queued" }))' \
            content/post-queue.json > /tmp/new-queue.json

          mv /tmp/new-queue.json content/post-queue.json
          echo "[]" > content/proposed-briefs.json

          echo "Migrated briefs into post-queue.json. Here's the new tail:"
          jq '.[-4:] | map({ slug, scheduledDate, status })' content/post-queue.json

      - name: Commit + push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.email "noreply@gadgetconstructionsf.com"
          git config user.name "Gadget Construction Bot"
          git add content/post-queue.json content/proposed-briefs.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Migrate proposed briefs into content queue

Automated migration — the briefs from content/proposed-briefs.json
are now in post-queue.json with status=queued. The Friday draft
automation will pick them up on their scheduled dates."
          git push
