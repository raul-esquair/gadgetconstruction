name: Weekly blog draft

# Every Friday morning Pacific, generates a draft of the next queued blog post
# and opens a PR for human review. The pipeline:
#   1. Find next post with status="queued" in content/post-queue.json
#   2. Call Claude API with brief + style-reference.md + 2 recent published posts
#   3. Insert generated content into lib/blog-data.ts
#   4. Flip status to "drafted"
#   5. Commit to a new branch and open a PR
#
# Raul reviews/edits the PR over the weekend. Merged posts auto-publish on their
# scheduled date via the existing weekly-publish.yml workflow.

on:
  schedule:
    # Friday 16:00 UTC = 9am PDT (summer) / 8am PST (winter)
    - cron: '0 16 * * 5'
  # Manual trigger for testing and off-schedule drafting
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model (claude-sonnet-4-6 or claude-opus-4-7)'
        required: false
        default: 'claude-sonnet-4-6'
        type: choice
        options:
          - claude-sonnet-4-6
          - claude-opus-4-7

jobs:
  generate-draft:
    name: Generate next blog draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for queued posts
        id: check-queue
        run: |
          if ! jq -e '.[] | select(.status == "queued")' content/post-queue.json > /dev/null; then
            echo "No queued posts remaining. Skipping draft generation."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate blog draft
        if: steps.check-queue.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: ${{ inputs.model || 'claude-sonnet-4-6' }}
          # Comma-separated list of reviewers who get the HTML email.
          # Edit this list to change recipients — no new secret needed.
          DRAFT_REVIEW_EMAILS: "admin@esquair.com,info@gadgetconstructionsf.com"
          # Uses the same verified sender as the contact form to avoid adding a new Resend verified identity
          DRAFT_FROM_EMAIL: "Gadget Drafts <estimates@gadgetconstructionsf.com>"
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx tsx scripts/generate-post.ts
