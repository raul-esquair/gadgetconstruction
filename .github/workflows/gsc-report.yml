name: GSC report on demand

# Manual trigger. Runs scripts/fetch-gsc-data.ts and uploads the JSON report
# as a workflow artifact so we can pull it locally for ad-hoc analysis.

on:
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch GSC report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch GSC report
        env:
          GSC_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "Service account email: $(echo "$GSC_SERVICE_ACCOUNT_JSON_BASE64" | base64 -d | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>console.log(JSON.parse(s).client_email))')"
          mkdir -p .gsc-report
          npx tsx scripts/fetch-gsc-data.ts > .gsc-report/report.json
          echo "Report size: $(wc -c < .gsc-report/report.json) bytes"
          echo "First 40 lines:"
          head -40 .gsc-report/report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsc-report
          path: .gsc-report/report.json
          retention-days: 7
