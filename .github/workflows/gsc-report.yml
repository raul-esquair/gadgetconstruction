name: GSC report on demand

# Manual trigger. Runs scripts/fetch-gsc-data.ts and uploads the JSON report
# as a workflow artifact so we can pull it locally for ad-hoc analysis.

on:
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch GSC report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: List accessible GSC sites (diagnostic)
        env:
          GSC_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          npx tsx -e "
          import { google } from 'googleapis';
          (async () => {
            const creds = JSON.parse(Buffer.from(process.env.GSC_SERVICE_ACCOUNT_JSON_BASE64, 'base64').toString('utf-8'));
            const auth = new google.auth.JWT({ email: creds.client_email, key: creds.private_key, scopes: ['https://www.googleapis.com/auth/webmasters.readonly'] });
            const sc = google.searchconsole({ version: 'v1', auth });
            const r = await sc.sites.list();
            console.log('SITES_ACCESSIBLE:', JSON.stringify(r.data.siteEntry, null, 2));
          })();
          "

      - name: Fetch GSC report
        env:
          GSC_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          mkdir -p .gsc-report
          npx tsx scripts/fetch-gsc-data.ts > .gsc-report/report.json
          echo "Report size: $(wc -c < .gsc-report/report.json) bytes"
          echo "First 40 lines:"
          head -40 .gsc-report/report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsc-report
          path: .gsc-report/report.json
          retention-days: 7
